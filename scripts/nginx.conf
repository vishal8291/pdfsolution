# =============================================================
#  Nginx Config — PDF Solution
#  Place at: /etc/nginx/sites-available/pdfsolution
#  Enable:   ln -s /etc/nginx/sites-available/pdfsolution \
#                   /etc/nginx/sites-enabled/
#            nginx -t && systemctl reload nginx
#
#  SSL: use Certbot → certbot --nginx -d yourdomain.com
# =============================================================

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (Certbot fills these in) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Modern TLS only (TLS 1.2 + 1.3)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Compression (gzip + brotli if module installed) ──────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript application/json application/wasm
        text/css text/javascript text/plain image/svg+xml;

    # ── Security headers (supplement server-side headers) ────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static React frontend ─────────────────────────────────
    root /var/www/pdfsolution/dist;
    index index.html;

    # Cache hashed JS/CSS chunks for 1 year (they change filename on update)
    location ~* \.(js|css|woff2?|ico|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve the app shell for all frontend routes (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";   # index.html must never be stale
    }

    # ── API proxy → Node.js server ───────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Don't buffer — send API responses immediately
        proxy_buffering off;
    }

    # ── Block common attack vectors ──────────────────────────
    location ~ /\. { deny all; }               # block dotfiles (.env etc.)
    location ~* \.(sh|env|git)$ { deny all; }  # block scripts/secrets
    location = /robots.txt  { log_not_found off; }
    location = /favicon.ico { log_not_found off; }
}
